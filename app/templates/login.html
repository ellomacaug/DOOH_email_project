<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body style="max-width: 500px; margin: 60px auto;">
  <h1>🔐 Вход в систему</h1>
  {% if error %}
    <div style="color: red;">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Почта:</label>
    <input type="email" name="email" required placeholder="you@doohrussia.ru">
    <label>Пароль приложения:</label>
    <input type="password" name="password" required placeholder="••••••••">
    <a href="https://yandex.ru/support/id/ru/authorization/app-passwords#create" style="margin-bottom: 20px; font-size: 14px; color: #555;">Инструкция, как получить пароль<br></a>
    <button type="submit" class="primary-btn" style="margin-top: 10px;">Войти</button>
  </form>
</body>
</html>
